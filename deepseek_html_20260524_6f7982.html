<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free IPTV</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a1a; color: #fff; }
        #player { width: 80%; max-width: 800px; margin: 20px auto; }
        #channel-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        #channel-list li { background: #333; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        #channel-list li:hover { background: #e50914; }
        .disclaimer { font-size: 0.8em; margin-top: 30px; color: #888; max-width: 800px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <h1>My Free IPTV Project</h1>
    <div id="player">
        <!-- HLS.js প্লেয়ার এখানে ভিডিও দেখাবে -->
        <video id="video" controls width="100%"></video>
    </div>
    <h2>Available Channels</h2>
    <ul id="channel-list">
        <!-- চ্যানেল লিস্ট ডায়নামিক্যালি জাভাস্ক্রিপ্ট দিয়ে লোড হবে -->
    </ul>
    <div class="disclaimer">
        <p><strong>Disclaimer:</strong> This site does not host, stream, or store any video content. All links are aggregated from publicly available third-party sources on the internet. All content and trademarks belong to their respective owners.</p>
    </div>

    <!-- HLS.js লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // একটি স্যাম্পল M3U8 প্লেলিস্ট (এটি পরিবর্তন করে আপনার পছন্দের লিংক দিন)
        const PLAYLIST_URL = 'https://iptv-org.github.io/iptv/index.m3u';

        const video = document.getElementById('video');
        const channelList = document.getElementById('channel-list');

        // প্লেলিস্ট পার্স করার ফাংশন
        async function loadPlaylist(url) {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const lines = text.split('\n');
                const channels = [];
                let currentChannel = {};
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        const nameMatch = line.match(/,(.+)$/);
                        if (nameMatch) currentChannel.name = nameMatch[1].trim();
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        if (logoMatch) currentChannel.logo = logoMatch[1];
                    } else if (line && !line.startsWith('#')) {
                        currentChannel.url = line.trim();
                        channels.push(currentChannel);
                        currentChannel = {};
                    }
                });
                return channels;
            } catch (error) {
                console.error('Error fetching playlist:', error);
                return [];
            }
        }

        // চ্যানেল প্লে করার ফাংশন
        function playChannel(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                });
            }
        }

        // UI-তে চ্যানেল লোড করা
        async function init() {
            const channels = await loadPlaylist(PLAYLIST_URL);
            channels.slice(0, 50).forEach(channel => {
                const li = document.createElement('li');
                li.textContent = channel.name || 'Unknown Channel';
                li.addEventListener('click', () => playChannel(channel.url));
                channelList.appendChild(li);
            });
        }

        init();
    </script>
</body>
</html>
