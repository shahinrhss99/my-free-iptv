<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি আইপিটিভি হোস্টিং</title>
    <!-- Clappr Live TV Player CDN -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; color: #fff; font-family: Arial, sans-serif; text-align: center; }
        .container { max-width: 900px; margin: 20px auto; padding: 10px; }
        #player { width: 100%; height: 480px; background: #000; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 10px; }
        .channel-btn { background: #222; border: 1px solid #444; color: #fff; padding: 12px; cursor: pointer; border-radius: 5px; transition: 0.3s; font-size: 14px; }
        .channel-btn:hover { background: #ff0055; border-color: #ff0055; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ফ্রি লাইভ টিভি প্লেয়ার</h2>
        
        <!-- ভিডিও প্লেয়ার কন্টেইনার -->
        <div id="player"></div>

        <h3>চ্যানেল লিস্ট</h3>
        <div class="channel-list">
            <!-- এখানে আপনার ইচ্ছেমতো ফ্রি চ্যানেলের নাম ও m3u8 লিংক বসিয়ে দিন -->
            <button class="channel-btn" onclick="playVideo('http://198.195.239.50:8095/Tsports/index.m3u8')">চ্যানেল ২</button>
            <button class="channel-btn" onclick="playVideo('http://198.195.239.50:8095/Tsports/index.m3u8')">চ্যানেল ৩</button>
        </div>
    </div>

    <script>
        // ডিফল্ট প্লেয়ার সেটআপ
        var player = new Clappr.Player({
            source: "https://pubads.g.doubleclick.net/ssai/event/X7b3pS3vR76vG-p3yqF7gA/master.m3u8", // প্রথম সোর্স
            parentId: "#player",
            width: "100%",
            height: "100%",
            autoPlay: false
        });

        // চ্যানেল পরিবর্তনের ফাংশন
        function playVideo(url) {
            player.load(url);
            player.play();
        }
    </script>
</body>
</html>
